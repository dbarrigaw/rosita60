  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

vealPop .85s ease both;animation-timeline:view();animation-range:entry 0% cover 26%\">\n          <div style=\"font-weight:500;letter-spacing:.16em;text-transform:uppercase;font-size:.68rem;color:#b8754f\">{{ t.time }}<\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif;font-weight:400;font-size:1.55rem;color:#2e2a26;line-height:1.15;margin:.4rem 0 .6rem\">{{ t.name }}<\u002Fh3>\n          <p style=\"font-size:.96rem;color:#5e6b58;line-height:1.72;max-width:62ch\">{{ t.desc }}<\u002Fp>\n          <div style=\"margin-top:.9rem;font-family:'Fraunces',serif;font-style:italic;font-size:.86rem;color:#a9863f\">{{ t.prep }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- 02 THE SPA DAY -->\n  <section style=\"padding:6vh 0 7vh\">\n    <div data-reveal=\"\" style=\"max-width:780px;margin:0 auto;padding:0 28px;animation:revealPop .8s ease both;animation-timeline:view();animation-range:entry 0% cover 22%\">\n      <div style=\"text-align:center;font-weight:500;letter-spacing:.34em;text-transform:uppercase;font-size:.7rem;color:#b8754f;margin-bottom:1rem\">02 — The spa day<\u002Fdiv>\n      <h2 style=\"text-align:center;font-family:'Fraunces',serif;font-weight:300;font-size:clamp(2rem,6vw,3.1rem);color:#3f4a3c;line-height:1.05;margin-bottom:.7rem\">Wander every room<\u002Fh2>\n      <p style=\"text-align:center;max-width:50ch;margin:0 auto 1.6rem;color:#5e6b58;font-size:1.02rem\">On every visit, the whole spa is yours — salt, clay, forest, ice, steam, and warm Korean baths. Take your time in each, all day long.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"max-width:460px;margin:0 auto;padding:0 28px\">\n      <div style=\"position:relative;height:clamp(440px,66vh,520px);perspective:1300px;margin-bottom:1.8rem\">\n        <sc-for list=\"{{ deckCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div data-rel=\"{{ c.rel }}\" onpointerdown=\"{{ deckDown }}\" style=\"position:absolute;inset:0;background:linear-gradient(165deg,#fefbf5,#f6ecdd);border:1px solid #e4d8c6;border-radius:18px;box-shadow:0 32px 64px -34px rgba(63,74,60,.55), inset 0 1px 0 rgba(255,255,255,.65);overflow:hidden;display:flex;flex-direction:column;cursor:grab;touch-action:pan-y;will-change:transform;transition:transform .42s cubic-bezier(.2,.8,.2,1), opacity .42s ease;transform:{{ c.t }};z-index:{{ c.z }};opacity:{{ c.op }}\">\n            <div style=\"height:6px;background:linear-gradient(90deg,#b8754f,#d8a24f);flex:none\"><\u002Fdiv>\n            <span aria-hidden=\"true\" style=\"position:absolute;right:.4rem;bottom:-1.8rem;font-family:'Fraunces',serif;font-size:9rem;line-height:1;color:#b8754f;opacity:.06;pointer-events:none\">{{ c.no }}<\u002Fspan>\n            <div style=\"position:relative;display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:1.7rem 1.8rem 0\">\n              <span style=\"font-family:'Fraunces',serif;font-style:italic;font-size:1rem;color:#b8754f\">No. {{ c.no }}<\u002Fspan>\n              <span style=\"font-weight:500;letter-spacing:.14em;text-transform:uppercase;font-size:.58rem;color:#a9863f;border:1px solid #e6dcc9;border-radius:100px;padding:.36rem .8rem;background:rgba(255,255,255,.7);white-space:nowrap\">{{ c.time }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative;padding:1.1rem 1.8rem 2rem;display:flex;flex-direction:column;gap:1rem;flex:1\">\n              <h3 style=\"font-family:'Fraunces',serif;font-weight:400;font-size:1.9rem;color:#2e2a26;line-height:1.08\">{{ c.name }}<\u002Fh3>\n              <div style=\"display:flex;align-items:center;gap:.7rem\">\n                <span style=\"height:1px;width:26px;background:#cbb89c;flex:none\"><\u002Fspan>\n                <span style=\"font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:#a9863f\">{{ c.benefits }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:.96rem;color:#5e6b58;line-height:1.76\">{{ c.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:1.4rem\">\n        <button onclick=\"{{ deckPrev }}\" aria-label=\"Previous room\" style=\"width:48px;height:48px;border-radius:50%;border:1px solid #ddd0bf;background:rgba(255,255,255,.6);color:#3f4a3c;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s\" style-hover=\"background:#fff\">‹<\u002Fbutton>\n        <span style=\"font-family:'Fraunces',serif;font-style:italic;color:#5e6b58;font-size:1rem;min-width:64px;text-align:center\">{{ deckPos }} / {{ deckTotal }}<\u002Fspan>\n        <button onclick=\"{{ deckNext }}\" aria-label=\"Next room\" style=\"width:48px;height:48px;border-radius:50%;border:1px solid #ddd0bf;background:rgba(255,255,255,.6);color:#3f4a3c;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s\" style-hover=\"background:#fff\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:1rem;font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:#5e6b58\">Swipe the card, or tap the arrows<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PHOTO: FAMILY -->\n  <section data-reveal=\"\" style=\"max-width:880px;margin:0 auto;padding:5vh 28px 6vh;animation:revealPop .9s ease both;animation-timeline:view();animation-range:entry 0% cover 22%\">\n    <div style=\"text-align:center;font-weight:500;letter-spacing:.34em;text-transform:uppercase;font-size:.68rem;color:#b8754f;margin-bottom:1.4rem\">All of us<\u002Fdiv>\n    <image-slot id=\"photo-family\" src=\"data:image/webp;base64,UklGRjqcAgBXRUJQVlA4WAoAAAAgAAAArwQAhgMASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAA px);display:block\"><\u002Fimage-slot>\n  <\u002Fsection>\n\n  <!-- 03 LETTER -->\n  <section style=\"max-width:780px;margin:0 auto;padding:5vh 28px 6vh\">\n    <div data-reveal=\"\" style=\"animation:revealPop .8s ease both;animation-timeline:view();animation-range:entry 0% cover 22%\">\n      <div style=\"text-align:center;font-weight:500;letter-spacing:.34em;text-transform:uppercase;font-size:.7rem;color:#b8754f;margin-bottom:2.4rem\">03 — A note from me<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"background:linear-gradient(180deg,#fffdf9,#fbf6ee);border:1px solid #ddd0bf;border-radius:5px;padding:clamp(2rem,6vw,4rem);box-shadow:0 30px 60px -40px rgba(63,74,60,.4);position:relative;animation:revealPop .8s ease both;animation-timeline:view();animation-range:entry 0% cover 22%\">\n      <div style=\"position:absolute;top:18px;left:18px;right:18px;bottom:18px;border:1px solid #ddd0bf;border-radius:3px;pointer-events:none;opacity:.6\"><\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"font-family:'Fraunces',serif;font-style:italic;font-size:1.6rem;color:#b8754f;margin-bottom:1.6rem\">Mami,<\u002Fdiv>\n        <div contenteditable=\"true\" spellcheck=\"false\" style=\"font-size:1.06rem;line-height:1.95;color:#2e2a26;white-space:pre-wrap;outline:none;border-radius:3px;transition:background .2s\" style-focus=\"background:rgba(169,134,63,.06);box-shadow:0 0 0 2px rgba(169,134,63,.25)\">Feliz Cumpleaños!\nSesenta! Wow\n\nI hope you can look back with pride and happiness for what you have done and accomplished and with the people you were able to share it with. I wish for even more in the years to come.\n\nComo siempre, gracias por todo lo que haces para nosotros.\nTe quiero mucho!<\u002Fdiv>\n        <div style=\"margin-top:2rem;font-family:'Fraunces',serif;font-style:italic;font-size:1.25rem;color:#3f4a3c\">— Diego<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CLOSING -->\n  <section data-reveal=\"\" style=\"text-align:center;padding:6vh 28px 12vh;animation:revealPop .8s ease both;animation-timeline:view();animation-range:entry 0% cover 22%\">\n    <div style=\"font-family:'Fraunces',serif;font-style:italic;font-size:2.4rem;color:#b8754f;line-height:1\">♥<\u002Fdiv>\n    <p style=\"margin-top:1.4rem;color:#5e6b58\">Here’s to sixty years, and to a day that’s only about you.<\u002Fp>\n    <div style=\"margin-top:2.6rem;font-size:.86rem;color:#5e6b58;border-top:1px solid #ddd0bf;padding-top:1.8rem;max-width:52ch;margin-left:auto;margin-right:auto\">\n      <strong style=\"color:#3f4a3c;font-weight:500\">The details:<\u002Fstrong> K Spa · 4520 Beach Blvd, Buena Park, CA 90621 · (714) 670-1000. Call ahead to reserve treatments — walk-ins welcome for the baths and saunas. Soak 10–15 minutes before each scrub, and plan to make a whole day of it.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;ambientSteam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;paperGrain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { phase: \"closed\", deck: 0 };\n\n  openEnvelope = () => {\n    if (this.state.phase !== \"closed\") return;\n    this.setState({ phase: \"opening\" });\n    clearTimeout(this._gone);\n    this._gone = setTimeout(() => this.setState({ phase: \"gone\" }), 3200);\n  };\n\n  envelopeEnd = (e) => {\n    if (e && e.animationName === \"bgFade\") {\n      clearTimeout(this._gone);\n      this.setState({ phase: \"gone\" });\n    }\n  };\n\n  renderVals() {\n    const opening = this.state.phase === \"opening\";\n    const treatments = [\n      { name: \"Gold Scrub Massage\", time: \"100 minutes\", desc: \"A full Korean body scrub, then a pure gold gel treatment and gold body wrap to cleanse and hydrate the skin. Finished with a full-body massage in aroma lotion & oil, a fresh cucumber & collagen face mask, and a nourishing hair treatment.\", prep: \"Soak or steam 10\\u201315 min beforehand\" },\n      { name: \"Coconut Scrub Massage\", time: \"80 minutes\", desc: \"A full Korean body scrub paired with a full-body massage using warm coconut-oil products. It relaxes the senses, eases stress and wakes up circulation \\u2014 leaving your skin softer than it has ever felt. Includes a nourishing hair treatment and collagen facial mask.\", prep: \"Soak or steam 10\\u201315 min beforehand\" },\n      { name: \"Aroma Scrub Massage\", time: \"80 minutes\", desc: \"A Korean body scrub followed by a calming, balancing cream smoothed over the body and face, then a relaxing massage with herbal-infused aroma oil. Includes a nourishing hair treatment and collagen facial mask.\", prep: \"Soak or steam 10\\u201315 min beforehand\" },\n      { name: \"Combination Massage\", time: \"90 minutes\", desc: \"The best of both worlds \\u2014 a blend of traditional acupressure and a Swedish oil massage. Pressure on the body's vital points rebalances and relieves tension, while warm mineral oil leaves you refreshed and rejuvenated, in a private room.\", prep: \"Enjoyed in a relaxing private room\" }\n    ];\n    const amenities = [\n      { no: \"01\", slot: \"am-salt\", ph: \"Salt Room photo\", name: \"Salt Room\", time: \"Stay 10\\u201320 min\", benefits: \"Detox \\u00b7 Immunity \\u00b7 Circulation\", desc: \"Organic Himalayan salt draws toxins from the body for speedy cell repair and a stronger immune system. Thousand-year-old minerals \\u2014 calcium, magnesium, iron and sodium \\u2014 purify the airways, lift circulation and ease tired muscles.\" },\n      { no: \"02\", slot: \"am-clay\", ph: \"Red Clay Room photo\", name: \"Red Clay Room\", time: \"Stay 10\\u201320 min\", benefits: \"Detox \\u00b7 Lymphatic \\u00b7 Calming\", desc: \"Clay specially imported from Korea, prized for centuries for healing and beauty. The natural mud stimulates the lymphatic system, draws out heavy metals and radiates gentle far-infrared warmth for a deeply calming cleanse.\" },\n      { no: \"03\", slot: \"am-forest\", ph: \"Forest Room photo\", name: \"Forest Room\", time: \"Stay 10\\u201320 min\", benefits: \"Aromatherapy \\u00b7 Skin \\u00b7 Calm\", desc: \"Aromatic wood fills the air with terpene, a natural compound that quiets the nerves and soothes troubled skin. A few minutes among the woodsy scents clears the head and refreshes you head to toe.\" },\n      { no: \"04\", slot: \"am-ice\", ph: \"Ice Room photo\", name: \"Ice Room\", time: \"Stay 5\\u201310 min\", benefits: \"Cooling \\u00b7 Skin \\u00b7 Refresh\", desc: \"Step in straight from a hot sauna: the cold air closes pores, firms the skin and cools you down. The hot-then-cold contrast sends circulation racing and leaves you tingling and awake.\" },\n      { no: \"05\", slot: \"am-jjim\", ph: \"Jjimjilbang photo\", name: \"Jjimjilbang\", time: \"Stay as long as you like\", benefits: \"Rest \\u00b7 Warmth \\u00b7 Nap\", desc: \"The heart of the Korean spa \\u2014 a warm, ondol-heated floor where you can stretch out, nap, read, and do absolutely nothing. The radiant heat loosens every muscle while you simply rest.\" },\n      { no: \"06\", slot: \"am-dry\", ph: \"Dry Sauna photo\", name: \"Dry Sauna\", time: \"Stay 10\\u201315 min\", benefits: \"Sweat \\u00b7 Detox \\u00b7 Relief\", desc: \"A high-heat wooden sauna that brings on a deep, cleansing sweat \\u2014 flushing toxins, easing stiff joints and quietly melting away the week\\u2019s tension.\" },\n      { no: \"07\", slot: \"am-steam\", ph: \"Steam Sauna photo\", name: \"Steam Sauna\", time: \"Stay 10\\u201315 min\", benefits: \"Hydrate \\u00b7 Breathe \\u00b7 Glow\", desc: \"Warm, humid air opens the pores and drenches the skin in moisture while easing the lungs and sinuses. Breathe deep and let the steam do all the work.\" },\n      { no: \"08\", slot: \"am-bath\", ph: \"Hot & Cold Baths photo\", name: \"Hot & Cold Baths\", time: \"Soak 10\\u201315 min\", benefits: \"Circulation \\u00b7 Soak \\u00b7 Renew\", desc: \"Traditional Korean soaking pools at contrasting temperatures. Drift between hot and cold to boost circulation and soak the years away \\u2014 the perfect prelude to each scrub.\" },\n      { no: \"09\", slot: \"am-dining\", ph: \"Caf\\u00e9 & Restaurant photo\", name: \"Caf\\u00e9 & Restaurant\", time: \"Whenever you\\u2019re hungry\", benefits: \"Korean kitchen \\u00b7 Teas \\u00b7 Sweets\", desc: \"When hunger calls, the on-site restaurant and caf\\u00e9 serve fresh Korean dishes, teas and sweet treats \\u2014 no need to change out of your robe.\" }\n    ];\n    const N = amenities.length;\n    this._N = N;\n    const deck = this.state.deck || 0;\n    const deckCards = amenities.map((a, i) => {\n      const rel = (i - deck + N) % N;\n      let t = \"translateY(48px) scale(.85)\", z = 30, op = 0;\n      if (rel === 0) { t = \"translateY(0px) scale(1) rotate(0deg)\"; z = 40; op = 1; }\n      else if (rel === 1) { t = \"translateY(14px) scale(.955) rotate(-2.4deg)\"; z = 39; op = 1; }\n      else if (rel === 2) { t = \"translateY(28px) scale(.91) rotate(2.4deg)\"; z = 38; op = 1; }\n      else if (rel === 3) { t = \"translateY(40px) scale(.875) rotate(-1.4deg)\"; z = 37; op = 0.45; }\n      return Object.assign({}, a, { rel: String(rel), t, z, op });\n    });\n\n    return {\n      treatments,\n      amenities,\n      deckCards,\n      deckPos: deck + 1,\n      deckTotal: N,\n      deckDown: this.deckDown,\n      deckPrev: this.deckPrev,\n      deckNext: this.deckNext,\n      steam: this.props.ambientSteam ?? true,\n      grain: this.props.paperGrain ?? true,\n      showEnvelope: this.state.phase !== \"gone\",\n      openEnvelope: this.openEnvelope,\n      envelopeEnd: this.envelopeEnd,\n      flipAnim: opening ? \"flip3d .85s cubic-bezier(.6,0,.32,1) forwards\" : \"none\",\n      frontAnim: opening ? \"faceFront .85s cubic-bezier(.6,0,.32,1) forwards\" : \"none\",\n      backAnim: opening ? \"faceBack .85s cubic-bezier(.6,0,.32,1) forwards\" : \"none\",\n      flapAnim: opening ? \"flapOpen .55s ease .92s forwards\" : \"none\",\n      sealAnim: opening ? \"sealLift .5s ease 1s forwards\" : \"none\",\n      envAnim: opening ? \"envZoom 1.15s cubic-bezier(.7,0,.28,1) 1.6s forwards\" : \"none\",\n      bgAnim: opening ? \"bgFade .5s ease 2.5s forwards\" : \"none\"\n    };\n  }\n\n  // --- swipeable room deck ---\n  // Listeners are bound to the card itself with pointer capture so touch events\n  // keep routing to it even as the finger leaves the element (the reliable\n  // cross-browser way to make a horizontal swipe work on mobile).\n  deckDown = (e) => {\n    const card = e.currentTarget;\n    if (!card || card.getAttribute(\"data-rel\") !== \"0\") return;\n    this._d = { x: e.clientX, y: e.clientY, card, dx: 0, locked: false, id: e.pointerId };\n    card.style.transition = \"none\";\n    try { card.setPointerCapture(e.pointerId); } catch (err) {}\n    card.addEventListener(\"pointermove\", this.deckMove);\n    card.addEventListener(\"pointerup\", this.deckEnd);\n    card.addEventListener(\"pointercancel\", this.deckEnd);\n  };\n  deckMove = (e) => {\n    if (!this._d) return;\n    const dx = e.clientX - this._d.x;\n    const dy = e.clientY - this._d.y;\n    // Decide once whether this gesture is a horizontal swipe or a vertical scroll.\n    if (!this._d.locked) {\n      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;\n      if (Math.abs(dy) > Math.abs(dx)) { this.deckEnd(e); return; } // let the page scroll\n      this._d.locked = true;\n    }\n    if (e.cancelable) e.preventDefault();\n    this._d.dx = dx;\n    this._d.card.style.transform = \"translateX(\" + dx + \"px) rotate(\" + (dx * 0.05) + \"deg)\";\n  };\n  deckEnd = (e) => {\n    const d = this._d; this._d = null;\n    if (!d) return;\n    const card = d.card;\n    card.removeEventListener(\"pointermove\", this.deckMove);\n    card.removeEventListener(\"pointerup\", this.deckEnd);\n    card.removeEventListener(\"pointercancel\", this.deckEnd);\n    try { card.releasePointerCapture(d.id); } catch (err) {}\n    card.style.transition = \"transform .42s cubic-bezier(.2,.8,.2,1)\";\n    const N = this._N || 1;\n    if (Math.abs(d.dx) > 60) {\n      const dir = d.dx < 0 ? 1 : -1;\n      this.setState((s) => ({ deck: ((s.deck + dir) % N + N) % N }));\n    } else {\n      card.style.transform = \"translateY(0px) scale(1) rotate(0deg)\";\n    }\n  };\n  deckPrev = () => { const N = this._N || 1; this.setState((s) => ({ deck: ((s.deck - 1) % N + N) % N })); };\n  deckNext = () => { const N = this._N || 1; this.setState((s) => ({ deck: (s.deck + 1) % N })); };\n\n  // Reveal-on-scroll and the progress bar are pure CSS (revealPop / growProgress\n  // with animation-timeline), so the logic class never mutates styles the React\n  // runtime would overwrite. Only the carousel arrows need JS.\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
